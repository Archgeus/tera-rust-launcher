<section class="login-form-container-wrapper">
    <div class="login-form-container">
      <div class="tera-logo-1-wrapper">
        <img
          class="tera-logo-1-icon"
          loading="lazy"
          alt=""
          src="./assets/tera-logo@2x.png"
        />
      </div>

      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login" data-translate="LOGIN_TITLE">Login</button>
        <button class="auth-tab" id="tab-signup" data-translate="SIGNUP_TITLE">Register</button>
      </div>

      <!-- Login Panel -->
      <div id="panel-login" class="tab-panel active">
        <form class="login-form" autocomplete="off">
          <div class="input-fields-wrapper">
            <div class="input-fields">
              <input class="input-text" id="username" name="username" data-translate-placeholder="USERNAME_PLACEHOLDER" placeholder="Username" type="text" autofocus />
              <input class="input-text" id="password" name="password" data-translate-placeholder="PASSWORD_PLACEHOLDER" placeholder="Password" type="password" />
            </div>
          </div>
          <div class="login-error-msg" id="login-error-msg"></div>
          <div class="btn-wrapper">
            <button class="btn" id="login-button">
              <a class="login2" data-translate="LOGIN_BUTTON">LOGIN</a>
            </button>
          </div>
        </form>
      </div>

      <!-- Signup Panel -->
      <div id="panel-signup" class="tab-panel">
        <form class="login-form" id="signup-form" autocomplete="off">
          <div class="signup-scrollable">
            <div class="input-fields-wrapper">
              <div class="input-fields">
                <input class="input-text" id="signup-username" name="signup-username" data-translate-placeholder="USERNAME_PLACEHOLDER" placeholder="Username" type="text" />
                <input class="input-text" id="signup-email" name="signup-email" data-translate-placeholder="EMAIL_PLACEHOLDER" placeholder="Email" type="email" />
                <input class="input-text" id="signup-password" name="signup-password" data-translate-placeholder="PASSWORD_PLACEHOLDER" placeholder="Password" type="password" />
                <input class="input-text" id="signup-confirm-password" name="signup-confirm-password" data-translate-placeholder="CONFIRM_PASSWORD_PLACEHOLDER" placeholder="Confirm Password" type="password" />
              </div>
            </div>

            <div class="captcha-container" id="captcha-container">
              <div class="captcha-loading" id="captcha-loading" data-translate="CAPTCHA_LOADING">Loading captcha...</div>
              <div class="captcha-puzzle" id="captcha-puzzle" style="display:none;">
                <div class="captcha-images-wrapper">
                  <img id="captcha-bg-img" class="captcha-bg-img" alt="" />
                  <img id="captcha-block-img" class="captcha-block-img" alt="" style="left:0px;" />
                </div>
                <div class="captcha-slider-bar">
                  <div class="captcha-slider-track" id="captcha-slider-track">
                    <div class="captcha-slider-fill" id="captcha-slider-fill"></div>
                    <div class="captcha-slider-btn" id="captcha-slider-btn">&#10132;</div>
                  </div>
                </div>
                <div class="captcha-status-row">
                  <span class="captcha-status" id="captcha-status"></span>
                  <button type="button" class="captcha-reload-btn" id="captcha-reload-btn" title="Reload">&#8635;</button>
                </div>
              </div>
            </div>
          </div>

          <div class="login-error-msg" id="signup-error-msg"></div>
          <div class="signup-success-msg" id="signup-success-msg"></div>
          <div class="btn-wrapper">
            <button class="btn" id="signup-button">
              <a class="login2" data-translate="SIGNUP_BUTTON">REGISTER</a>
            </button>
          </div>
        </form>
      </div>

    </div>
  </section>
